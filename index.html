<!DOCTYPE html>
<html>
    <head>
        <title> Sudoku Solver </title>
        
        <meta charset=UTF-8 />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="theme-color" content="#000" />
        <meta name="description" content="Solve your Sudoku puzzle by SAT with one click!" />
        <meta name="author" content="Radin Masiha" />

        <meta property="og:title" content="Sudoku Solver">
        <meta property="og:description" content="Solve your Sudoku puzzle by SAT with one click!" />
        <meta property="og:image" content="./assets/images/solved.jpg">
        <meta property="og:type" content="website">
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="Sudoku Solver">
        <meta name="twitter:description" content="Solve your Sudoku puzzle by SAT with one click!" />
        <meta name="twitter:image" content="./assets/images/solved.jpg">

        <link rel="icon" type="image/jpeg" href="./assets/images/icon.jpg" />
        <link rel="stylesheet" href="./assets/styles/fonts.css" />
        <link rel="stylesheet" href="./assets/styles/main.css" />
    </head>
    <body>
        <div id="container"></div>
        <div id="buttons-wrapper">
            <div id="buttons">
                <button id="clear"> Clear </button>
                <button id="solve"> Solve </button>
            </div>
        </div>
        <p id="message"></p>
        
        <script>
            
            // Is it hosting on a server??
            const message = document.querySelector("#message");
            if (!window.location.protocol.startsWith("http")) {
                console.warn("You are not running the program on a server\nPlease host it on a local server");
                message.innerHTML = `
                    <b>⚠️ Note: </b>This program needs a hosting server to be run.
                    <br> You can start a <i>localhost</i> on your system if you're trying to run the program.
                `;
            }
            
        </script>
        <script type="module" src="src/sudoku.js"></script>
        <noscript>
            Oh oh! I see a problem...
            <br>
            Your browser doesn't support <b><i>JavaScript</i></b> language. Try checking <i><q>Site settings</q></i> or changing your browser.
        </noscript>
    </body>
</html>
